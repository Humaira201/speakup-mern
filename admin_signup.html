<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Sign Up | SpeakUp</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#0f172a;
  --royal:#1e3a8a;
  --indigo:#2563eb;
  --sky:#dbeafe;
  --green:#22c55e;
  --green-dark:#16a34a;
  --bg:#f5f7fb;
  --card:#ffffff;
  --muted:#f1f5f9;
  --text-main:#1f2933;
  --text-sub:#475569;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  background:linear-gradient(120deg,var(--navy),var(--royal));
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ================= CARD ================= */
.admin-card{
  background:var(--card);
  width:420px;
  padding:42px;
  border-radius:22px;
  box-shadow:0 40px 80px rgba(0,0,0,0.4);
  border-top:6px solid var(--royal);
}

.admin-card h2{
  text-align:center;
  color:var(--royal);
  margin-bottom:8px;
}

.admin-card p{
  text-align:center;
  font-size:14px;
  color:var(--text-sub);
  margin-bottom:28px;
}

/* ================= FORM ================= */
label{
  font-size:13px;
  font-weight:600;
  color:var(--text-main);
  display:block;
  margin-bottom:6px;
}

input{
  width:100%;
  padding:12px 14px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  margin-bottom:18px;
  outline:none;
  transition:0.3s;
}

input:focus{
  border-color:var(--royal);
  box-shadow:0 0 0 3px rgba(30,58,138,0.15);
}

/* ================= NOTICE ================= */
.notice{
  background:var(--muted);
  padding:14px;
  border-radius:12px;
  font-size:12px;
  color:var(--text-sub);
  margin-bottom:22px;
  border-left:4px solid var(--royal);
}

/* ================= BUTTON ================= */
.admin-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:var(--royal);
  color:white;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

.admin-btn:hover{
  background:var(--indigo);
  transform:translateY(-2px);
  box-shadow:0 15px 30px rgba(37,99,235,0.35);
}

/* ================= FOOTER TEXT ================= */
.footer-text{
  text-align:center;
  margin-top:18px;
  font-size:13px;
  color:var(--text-sub);
}

.footer-text a{
  color:var(--indigo);
  text-decoration:none;
  font-weight:500;
}
</style>
</head>

<body>

<div class="admin-card">
  
  <h2>Admin Sign Up</h2>
  <p>Authorized personnel only</p>

  <form>
    <p id="statusMsg" style="text-align:center; font-size:13px;"></p>

    <label>Admin Name</label>
    <input type="text" placeholder="Full name" required>

    <label>Official Email</label>
    <input type="email" placeholder="admin@university.edu" required>

    <label>Admin ID</label>
    <input type="text" placeholder="University-issued admin ID" required>

    <label>Password</label>
    <input type="password" placeholder="Create a strong password" required>

    <div class="notice">
      Admin accounts are subject to verification by the university authority before activation.
    </div>

    <button class="admin-btn">Create Admin Account</button>
  </form>

  <div class="footer-text">
    Already registered? <a href="#">Admin Login</a>
  </div>
</div>
<script>
const form = document.querySelector("form");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const adminData = {
    name: form.querySelectorAll("input")[0].value,
    email: form.querySelectorAll("input")[1].value,
    adminId: form.querySelectorAll("input")[2].value,
    password: form.querySelectorAll("input")[3].value
  };

  try {
    const response = await fetch("http://localhost:5000/api/admin/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(adminData)
    });

    const result = await response.json();

    if (response.ok) {
    document.getElementById("statusMsg").innerText = "Admin created successfully!";

      form.reset();
    } else {
      alert("❌ " + result.message);
    }

  } catch (error) {
    alert("⚠️ Server error. Please try again later.");
    console.error(error);
  }
});
</script>

</body>
</html>
